<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Books — The Author's Bookshelf</title>
  <meta name="description" content="Browse every book — get a free chapter or buy now." />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/pages.css" />
</head>
<body>
  <div id="site-header"></div>

  <main>
    <section class="section" id="books">
      <div class="container">
        <div class="section__head">
          <span class="eyebrow">The Collection</span>
          <h1>Explore the Books</h1>
          <p>Pick a title, grab a free chapter, or buy now — prices shown in your selected currency.</p>
        </div>
        <div id="books-grid" class="book-grid" aria-live="polite">
          <p class="state-msg">Loading books…</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <div id="lead-gate-modal"></div>

  <script src="js/config.js"></script>
  <script src="js/currency.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/api.js"></script>
  <script src="js/leadGate.js"></script>
  <script src="js/header.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/leadGateModal.js"></script>
  <script src="js/books-page.js"></script>
  <script>
    renderHeader();
    renderFooter();
    renderLeadGateModal();
    initBooksPage();
  </script>
</body>
</html>
