<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Book — Admin — The Author's Bookshelf</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="../styles/main.css" />
  <link rel="stylesheet" href="../styles/admin.css" />
</head>
<body class="admin-body">
  <div id="admin-nav"></div>

  <main class="admin-main">
    <div class="admin-header-row">
      <h1>Edit Book</h1>
      <a href="books.html" class="btn btn-secondary">Back to Books</a>
    </div>

    <div id="admin-book-form-mount">
      <p class="state-msg">Loading book…</p>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/adminApi.js"></script>
  <script src="../js/admin-common.js"></script>
  <script src="../js/admin-book-form.js"></script>
  <script>
    (async function init() {
      const me = await AdminCommon.requireAdminAuth();
      if (!me) return;
      AdminCommon.renderAdminNav("books", me.email);

      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      if (!id) {
        document.querySelector("#admin-book-form-mount").innerHTML =
          '<p class="state-msg state-msg--error">No book id given. <a href="books.html">Back to books</a>.</p>';
        return;
      }
      initAdminBookForm({ mode: "edit", id });
    })();
  </script>
</body>
</html>
